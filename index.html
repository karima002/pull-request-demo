<main class="page" id="page">
    <nav>
      <strong>View Transitions</strong>
      <button id="toggle">Change scene</button>
    </nav>
  
    <section class="hero">
      <div class="copy">
        <p id="label">Morning mode</p>
        <h1 id="title">Focus starts here.</h1>
        <p id="text">A calm layout transition powered by one DOM update.</p>
      </div>
  
      <div class="orb" id="orb"></div>
    </section>
  </main>

  <script>

const page = document.querySelector("#page");
const toggle = document.querySelector("#toggle");
const label = document.querySelector("#label");
const title = document.querySelector("#title");
const text = document.querySelector("#text");

function changeScene() {
  const isNight = page.classList.toggle("night");

  label.textContent = isNight ? "Night mode" : "Morning mode";
  title.textContent = isNight
    ? "Ideas glow after dark."
    : "Focus starts here.";

  text.textContent = isNight
    ? "The same DOM nodes morph between scenes using named transitions."
    : "A calm layout transition powered by one DOM update.";

  toggle.textContent = isNight ? "Back to morning" : "Change scene";
}

toggle.addEventListener("click", () => {
  if (!document.startViewTransition) {
    changeScene();
    return;
  }

  document.startViewTransition(changeScene);
});
  </script>

  <style>
